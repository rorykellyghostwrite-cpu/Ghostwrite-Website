<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Contact | GhostWrite Studios</title>

    <link rel="stylesheet" href="../styles.css">
</head>

<body>

<header>

    <img
        src="../GhostwriteStudios.png"
        alt="GhostWrite Studios Logo"
        class="logo"
    >

    <nav>
        <a href="../index.html">Home</a>
        <a href="genome.html">Genome</a>
        <a href="portfolio.html">Portfolio</a>
        <a href="writing.html">Writing</a>
        <a href="hireme.html">Hire Me</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
    </nav>

</header>

<main>

    <section class="hero">

        <h1>Contact GhostWrite Studios</h1>

        <p>
            For business inquiries, collaborations, writing projects,
            questions about our work, or interest in Genome: Apex Shifting,
            send us a message below.
        </p>

    </section>

    <section class="contact-form">

        <form
            action="https://formsubmit.co/rory@ghostwritestudios.com"
            method="POST"
        >

            <input
                type="hidden"
                name="_subject"
                value="New Message for GhostWrite Studios"
            >

            <input
                type="hidden"
                name="_captcha"
                value="false"
            >

            <label for="name">Name</label>

            <input
                type="text"
                id="name"
                name="name"
                required
            >

            <label for="email">Email</label>

            <input
                type="email"
                id="email"
                name="email"
                required
            >

            <label for="subject">Subject</label>

            <input
                type="text"
                id="subject"
                name="subject"
                required
            >

            <label for="message">Message</label>

            <textarea
                id="message"
                name="message"
                rows="8"
                required
            ></textarea>

            <button type="submit">
                Send Message
            </button>

        </form>

    </section>

</main>

<footer>

    <p>
        © 2026 GhostWrite Studios
    </p>

</footer>

</body>
</html>
